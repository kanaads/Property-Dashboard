<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--surface-app); padding: 24px; }
  #root { max-width: 660px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  .grp { display: flex; flex-direction: column; gap: 10px; padding: 16px 0; border-top: 1px solid var(--border-subtle); }
  .grp:first-child { border-top: none; padding-top: 0; }
  .cap { font: var(--font-eyebrow); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-tertiary); }
  .cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: end; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
const { Button, IconButton, Input, Select, Checkbox, Switch, Badge, Tag, Avatar } = window.PropviaDesignSystem_f80a0d;
const Ic = ({ d, f = "none" }) => <svg viewBox="0 0 24 24" fill={f} stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: d }} />;
const PLUS = '<path d="M12 5v14M5 12h14"/>';
const SEARCH = '<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>';
const DOTS = '<circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/>';

function Demo() {
  const [sel, setSel] = React.useState(true);
  return (
    <div>
      <div className="grp">
        <span className="cap">Buttons</span>
        <div className="row">
          <Button variant="primary" iconLeft={<Ic d={PLUS} />}>Add property</Button>
          <Button variant="secondary">Export</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="danger">Delete</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <Button size="sm" variant="secondary">Small</Button>
          <Button size="md" variant="secondary">Medium</Button>
          <Button size="lg" variant="primary" iconLeft={<Ic d={SEARCH} />}>Large</Button>
          <IconButton label="More" bordered><Ic d={DOTS} /></IconButton>
          <IconButton label="Add"><Ic d={PLUS} /></IconButton>
        </div>
      </div>

      <div className="grp">
        <span className="cap">Inputs &amp; Select</span>
        <div className="cols">
          <Input label="Keyword" placeholder="Search listings" iconLeft={<Ic d={SEARCH} />} />
          <Input label="Min price" prefix="$" placeholder="0" />
          <Select label="Property type" placeholder="All types" options={["Multifamily","Office","Retail","Industrial"]} />
        </div>
        <Input label="Email" required error="Enter a valid work email" defaultValue="dana@" />
      </div>

      <div className="grp">
        <span className="cap">Selection</span>
        <div className="row" style={{ gap: 24 }}>
          <Checkbox label="Off-market only" defaultChecked />
          <Checkbox label="Include sold comps" />
          <Switch label="Score-weighted sort" defaultChecked />
        </div>
      </div>

      <div className="grp">
        <span className="cap">Badges, Tags &amp; Avatars</span>
        <div className="row">
          <Badge tone="success" dot>Active</Badge>
          <Badge tone="brand" pill>Multifamily</Badge>
          <Badge tone="gold" appearance="solid">Off-market</Badge>
          <Badge tone="danger">Overpriced</Badge>
          <Badge tone="info" appearance="outline">New comp</Badge>
        </div>
        <div className="row">
          <Tag selectable selected={sel} onClick={() => setSel(!sel)}>Multifamily</Tag>
          <Tag selectable>Office</Tag>
          <Tag onRemove={() => {}}>Type: Retail</Tag>
          <Tag onRemove={() => {}}>$1M–$5M</Tag>
          <Avatar name="Dana Reyes" />
          <Avatar name="Marcus Hill" size="sm" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
